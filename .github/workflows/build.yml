name: Build
run-name: Build
on:
  push:
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-windows-gnu
          - os: ubuntu-latest
            target: x86_64-linux-gnu.2.17
    runs-on: ${{ matrix.os }}
    env:
      ZIG_VERSION: 0.16.0
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2.0.5
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev
      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          zig build -Dtarget=${{ matrix.target }}
          ls ./zig-out/bin
